name: Scrape DLU schedule

on:
  schedule:
    # Daily at 05:00 Asia/Saigon (22:00 UTC).
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scrape:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: schedule-tool
    env:
      PYTHONIOENCODING: utf-8
      DLU_USERNAME: ${{ secrets.DLU_USERNAME }}
      DLU_PASSWORD: ${{ secrets.DLU_PASSWORD }}
      TARGET_CLASSES: ${{ secrets.TARGET_CLASSES }}
      GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-scraper.txt
          playwright install chromium

      - name: Scrape and sync schedule
        run: python scraper.py
